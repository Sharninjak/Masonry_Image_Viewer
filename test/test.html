<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Type Render Example</title>
</head>
<body>
    <h1>文件渲染示例</h1>
    <button id="pickFilesBtn" type="button">选择文件（txt/json）</button>
    <button id="pickFolderBtn" type="button">选择文件夹</button>
    <input id="filesInput" type="file" accept=".txt,.json,text/plain,application/json" multiple hidden>
    <input id="folderInput" type="file" webkitdirectory directory multiple hidden>
    <div id="jsonData"></div>
    <script src="app.js"></script>
</body>
</html>
